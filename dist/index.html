    <style>
      /* Smooth scrolling */

      .mega-menu-enter-active {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 300ms, transform 300ms;
      }

      /* Animated Border Effect */
      @property --angle {
        syntax: '<angle>';
        initial-value: 0deg;
        inherits: false;
      }

      .animated-border {
        position: relative;
        isolation: isolate;
      }

      .animated-border::after {
        content: '';
        position: absolute;
        inset: -2px;
        z-index: -1;
        background: conic-gradient(from var(--angle), transparent 70%, #6FCFEB, #FABDA0, #6FCFEB);
        border-radius: inherit;
        animation: rotate 4s linear infinite;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .animated-border:hover::after {
        opacity: 1;
      }

      @keyframes rotate {
        0% { --angle: 0deg; }
        100% { --angle: 360deg; }
      }
      
      /* Fallback for browsers not supporting @property */
      .no-property-support .animated-border:hover {
